  </head>
  <body>
    <div class="scroll-progress"></div>

        <div class="avatar">
          <div class="avatar-inner"></div>
        </div>
        <h1 class="name">HCS</h1>
        <div class="role">
          <span class="role-text">I am</span>
          <div class="role-slider">
            <span>Developer</span>
            <span>Designer</span>
            <span>Creator</span>
            <span>Developer</span>
          </div>
        </div>
        <div class="socials">
          <a href="https://www.instagram.com/hcskaiask" target="_blank" class="social-link">
            <img src="src/icons/instagram.svg" alt="Instagram">
          </a>
          <a href="https://wa.me/+85266390096" target="_blank" class="social-link">
            <img src="src/icons/whatsapp.svg" alt="WhatsApp">

          <a href="https://discord.com/users/804712098625486848" target="_blank" class="social-link">
            <img src="src/icons/discord.svg" alt="Discord">
          </a>
          <a href="mailto:hcskaiask@gmail.com" class="social-link">
            <img src="src/icons/mail.svg" alt="Email">
          </a>
        </div>
      </div>
    </section>

    <section class="links-section">
      <div class="links-container">
        <a href="https://open.spotify.com/user/31c72hsyvyvywohccj5g35hmqm54" target="_blank" class="link-card scroll-reveal" data-reveal="slide-up">
          <div class="link-icon">
            <img src="src/icons/spotify.svg" alt="Spotify">
          </div>
          <span class="link-name">Spotify</span>
          <svg class="link-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 17L17 7M17 7H7M17 7V17"/>
          </svg>
        </a>
        
        <a href="https://github.com/hcs1219" target="_blank" class="link-card scroll-reveal" data-reveal="slide-up">
          <div class="link-icon github">
            <img src="src/icons/github.svg" alt="GitHub">
          </div>
          <span class="link-name">GitHub</span>

          </svg>
        </a>
      </div>
    </section>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scrollProgress = document.querySelector('.scroll-progress');
      window.addEventListener('scroll', () => {
        const scrolled = window.scrollY;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress.style.width = (scrolled / max * 100) + '%';
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -100px 0px' });

      document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    });
    </script>
  </body>
</html>
