<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="HandheldFriendly" content="true">
    <link rel="icon" type="image/x-icon" href="src/avatar/icon-character.png">
    <title>hcs</title>
    <meta name="og:title" content="hcs">
    <meta name="og:type" content="website">
    <meta name="og:image" content="src/avatar/icon-blur-background.png">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script>
    'use strict';
    window.onload = () => {
      if (location.protocol != 'https:') {
        location.replace(location.href.replace('http', 'https'));
      };
    };
    </script>
  </head>
  <body>
    <div class="scroll-progress"></div>
    
    <div class="hero-container">
      <div class="hero-content">
        <div class="pfp-wrapper scroll-reveal" data-reveal="scale">
          <div class="pfp"></div>
        </div>
        <p class="name scroll-reveal" data-reveal="fade-up">HCS</p>
        
        <div class="role-container scroll-reveal" data-reveal="fade-up">
          <span class="role-prefix">I am a</span>
          <div class="role-slider">
            <div class="role-track">
              <span class="role">Developer</span>
              <span class="role">Designer</span>
              <span class="role">Creator</span>
              <span class="role">Engineer</span>
              <span class="role">Developer</span>
            </div>
          </div>
        </div>
        
        <div class="icons scroll-reveal" data-reveal="stagger">
          <a class="icon" href="https://www.instagram.com/hcskaiask" style="background-image:url('src/icons/instagram.svg');" target="_blank"></a>
          <a class="icon" href="https://wa.me/+85266390096" style="background-image:url('src/icons/whatsapp.svg');" target="_blank"></a>
          <a class="icon" href="https://discord.com/users/804712098625486848" style="background-image:url('src/icons/discord.svg');" target="_blank"></a>
          <a class="icon" href="mailto:hcskaiask@gmail.com" style="background-image:url('src/icons/mail.svg');" target="_blank"></a>
        </div>
      </div>
    </div>

    <div class="links-container">
      <div class="links">
        <a class="link liquid-glass scroll-reveal" data-reveal="slide-left" href="https://open.spotify.com/user/31c72hsyvyvywohccj5g35hmqm54" target="_blank">
          <div class="liquid-glass-bg"></div>
          <div class="liquid-glass-blur"></div>
          <div class="link-content">
            <div class="icon-spotify" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg');"></div>
            <span class="site">Spotify</span>
          </div>
        </a>
        <a class="link liquid-glass scroll-reveal" data-reveal="slide-right" href="https://github.com/hcs1219" target="_blank">
          <div class="liquid-glass-bg"></div>
          <div class="liquid-glass-blur"></div>
          <div class="link-content">
            <div class="icon-github" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg');background-color:white;border-radius:100%;"></div>
            <span class="site">Github</span>
          </div>
        </a>
      </div>
    </div>

    <svg class="hidden-svg">
      <defs>
        <filter id="liquid-filter" x="0%" y="0%" width="100%" height="100%" colorInterpolationFilters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05" numOctaves="1" seed="1" result="turbulence"/>
          <feGaussianBlur in="turbulence" stdDeviation="2" result="blurredNoise"/>
          <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="70" xChannelSelector="R" yChannelSelector="B" result="displaced"/>
          <feGaussianBlur in="displaced" stdDeviation="4" result="finalBlur"/>
          <feComposite in="finalBlur" in2="finalBlur" operator="over"/>
        </filter>
      </defs>
    </svg>

    <script>
    'use strict';
    document.addEventListener('DOMContentLoaded', () => {
      const scrollProgress = document.querySelector('.scroll-progress');
      
      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPercent = (scrollTop / docHeight) * 100;
        scrollProgress.style.width = scrollPercent + '%';
      });

      const heroContent = document.querySelector('.hero-content');
      const heroContainer = document.querySelector('.hero-container');
      
      if (!window.matchMedia('(pointer: coarse)').matches) {
        heroContainer.addEventListener('mousemove', (e) => {
          const rect = heroContainer.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          
          const rotateX = (y - centerY) / 20;
          const rotateY = (centerX - x) / 20;
          
          heroContent.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        
        heroContainer.addEventListener('mouseleave', () => {
          heroContent.style.transform = 'rotateX(0) rotateY(0)';
        });
      }

      const observerOptions = {
        root: null,
        rootMargin: '0px',
        threshold: 0.15
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, observerOptions);

      document.querySelectorAll('.scroll-reveal').forEach(el => {
        observer.observe(el);
      });

      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          if (target) {
            target.scrollIntoView({
              behavior: 'smooth',
              block: 'start'
            });
          }
        });
      });
    });
    </script>
  </body>
</html>
