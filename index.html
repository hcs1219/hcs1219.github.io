    <script type="module">
    // Modern ES2025 module pattern
    const init = () => {
      const scrollProgress = document.querySelector('.scroll-progress');
      const scrollHint = document.querySelector('.scroll-hint');
      const profileCard = document.querySelector('.profile-card');
      const cardGlow = document.querySelector('.card-glow');
      
      // Use ResizeObserver for better performance than scroll events where possible
      let ticking = false;
      
      const updateScroll = () => {
        const scrolled = window.scrollY;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const progress = Math.min((scrolled / max) * 100, 100);
        
        if (scrollProgress) {
          scrollProgress.style.width = `${progress}%`;
        }
        
        if (scrollHint) {
          const opacity = scrolled > 50 ? '0' : '1';
          const pointerEvents = scrolled > 50 ? 'none' : 'auto';
          scrollHint.style.opacity = opacity;
          scrollHint.style.pointerEvents = pointerEvents;
        }
        
        ticking = false;
      };
      
      // Passive event listener for better scroll performance
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateScroll);
          ticking = true;
        }
      }, { passive: true });

      // Mouse glow effect with throttling
      if (profileCard && cardGlow) {
        let lastMove = 0;
        document.addEventListener('mousemove', (e) => {
          const now = performance.now();
          if (now - lastMove < 16) return; // Throttle to ~60fps
          lastMove = now;
          
          const rect = profileCard.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          cardGlow.style.background = `radial-gradient(600px circle at ${x}px ${y}px, rgba(255,255,255,0.06), transparent 40%)`;
        });
      }

      // Intersection Observer with modern options
      const observerOptions = { 
        threshold: [0.1, 0.5],
        rootMargin: '0px 0px -50px 0px' 
      };
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            // Unobserve after reveal for performance
            observer.unobserve(entry.target);
          }
        });
      }, observerOptions);

      document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    };

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
