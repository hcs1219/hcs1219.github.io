    <footer class="footer scroll-reveal" data-reveal="fade-up">
      <p>© 2024 HCS. All rights reserved.</p>
    </footer>

    <svg class="filters">
      <defs>
        <filter id="liquid" x="-50%" y="-50%" width="200%" height="200%">
          <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G"/>
          <feGaussianBlur stdDeviation="1"/>
        </filter>
      </defs>
    </svg>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scrollProgress = document.querySelector('.scroll-progress');
      const profileCard = document.querySelector('.profile-card');
      const cardGlow = document.querySelector('.card-glow');
      
      window.addEventListener('scroll', () => {
        const scrolled = window.scrollY;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress.style.width = (scrolled / max * 100) + '%';
        
        const parallax = scrolled * 0.3;
        profileCard.style.transform = `translateY(${parallax}px)`;
      });

      document.addEventListener('mousemove', (e) => {
        const rect = profileCard.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        cardGlow.style.background = `radial-gradient(600px circle at ${x}px ${y}px, rgba(255,255,255,0.06), transparent 40%)`;
      });

      const observerOptions = { 
        threshold: 0.1, 
        rootMargin: '0px 0px -50px 0px' 
      };
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, observerOptions);

      document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    });
    </script>
  </body>
</html>
