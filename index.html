    <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Scroll progress
      const scrollProgress = document.querySelector('.scroll-progress');
      window.addEventListener('scroll', () => {
        const scrolled = window.scrollY;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress.style.width = (scrolled / max * 100) + '%';
      }, { passive: true });

      // Role animation - CSS transform based, reliable
      const roleTrack = document.getElementById('roleTrack');
      const roleCount = 4;
      let currentRole = 0;
      
      setInterval(() => {
        currentRole = (currentRole + 1) % roleCount;
        roleTrack.style.transform = `translateY(-${currentRole * 28}px)`;
      }, 3000);

      // Section fade in/out on every scroll
      const sections = document.querySelectorAll('.snap-section');
      
      const sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
          } else {
            entry.target.classList.remove('in-view');
          }
        });
      }, { threshold: 0.3 });

      sections.forEach(s => sectionObserver.observe(s));

      // Link cards stagger
      const cards = document.querySelectorAll('.link-card');
      const cardObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => {
              entry.target.classList.add('show');
            }, i * 150);
          }
        });
      }, { threshold: 0.2 });

      cards.forEach(c => cardObserver.observe(c));
    });
    </script>
