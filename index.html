<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="HandheldFriendly" content="true">
    <link rel="icon" type="image/x-icon" href="src/avatar/icon-character.png">
    <title>hcs</title>
    <meta name="og:title" content="hcs">
    <meta name="og:type" content="website">
    <meta name="og:image" content="src/avatar/icon-blur-background.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script>
    'use strict';
    window.onload = () => {
      if (location.protocol != 'https:') {
        location.replace(location.href.replace('http', 'https'));
      };
    };
    </script>
  </head>
  <body>
    <div class="bg-gradient"></div>
    
    <main class="main">
      <section class="section hero" id="hero">
        <div class="content">
          <div class="profile-card">
            <div class="avatar-wrap">
              <div class="avatar-ring"></div>
              <div class="avatar-glow"></div>
              <div class="avatar"></div>
            </div>
            
            <div class="profile-info">
              <h1 class="name">HCS</h1>
              <div class="divider"></div>
              <p class="subtitle">Student & Developer</p>
            </div>
            
            <div class="socials">
              <a href="https://www.instagram.com/hcskaiask" target="_blank" class="social-link" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
              </a>
              <a href="https://wa.me/+85266390096" target="_blank" class="social-link" aria-label="WhatsApp">
                <i class="fab fa-whatsapp"></i>
              </a>
              <a href="https://discord.com/users/804712098625486848" target="_blank" class="social-link" aria-label="Discord">
                <i class="fab fa-discord"></i>
              </a>
              <a href="mailto:hcskaiask@gmail.com" class="social-link" aria-label="Email">
                <i class="fas fa-envelope"></i>
              </a>
            </div>
          </div>
        </div>
      </section>

      <section class="section links" id="links">
        <div class="content">
          <div class="links-header">
            <span class="eyebrow">Connect</span>
          </div>
          
          <div class="links-container">
            <a href="https://open.spotify.com/user/31c72hsyvyvywohccj5g35hmqm54" target="_blank" class="platform-card">
              <div class="platform-icon spotify">
                <i class="fab fa-spotify"></i>
              </div>
              <div class="platform-info">
                <span class="platform-name">Spotify</span>
                <span class="platform-desc">Music & Playlists</span>
              </div>
              <i class="fas fa-arrow-up-right platform-arrow"></i>
            </a>

            <a href="https://github.com/hcs1219" target="_blank" class="platform-card">
              <div class="platform-icon github">
                <i class="fab fa-github"></i>
              </div>
              <div class="platform-info">
                <span class="platform-name">GitHub</span>
                <span class="platform-desc">Code & Projects</span>
              </div>
              <i class="fas fa-arrow-up-right platform-arrow"></i>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script>
    const observerOptions = {
      threshold: 0.2,
      rootMargin: '0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          entry.target.classList.remove('hidden');
        } else {
          entry.target.classList.remove('visible');
          entry.target.classList.add('hidden');
        }
      });
    }, observerOptions);

    document.querySelectorAll('.section').forEach(el => {
      el.classList.add('hidden');
      observer.observe(el);
    });
    
    document.querySelectorAll('.platform-card').forEach((el, i) => {
      el.style.transitionDelay = `${i * 120}ms`;
      el.classList.add('hidden');
      observer.observe(el);
    });

    document.querySelectorAll('.social-link').forEach((el, i) => {
      el.style.transitionDelay = `${i * 80}ms`;
      el.classList.add('animate-in');
    });
    </script>
  </body>
</html>
