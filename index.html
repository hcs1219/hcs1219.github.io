    <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Scroll progress
      const scrollProgress = document.querySelector('.scroll-progress');
      window.addEventListener('scroll', () => {
        const scrolled = window.scrollY;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress.style.width = (scrolled / max * 100) + '%';
      }, { passive: true });

      // Role animation - simple and reliable
      const roleItems = document.querySelectorAll('.role-item');
      let currentRole = 0;
      const roleDuration = 2500;

      setInterval(() => {
        roleItems[currentRole].classList.remove('active');
        currentRole = (currentRole + 1) % roleItems.length;
        roleItems[currentRole].classList.add('active');
      }, roleDuration);

      // Section reveal
      const sections = document.querySelectorAll('.hero, .connect');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.2 });

      sections.forEach(s => observer.observe(s));

      // Link cards stagger
      const cards = document.querySelectorAll('.link-card');
      const cardObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => {
              entry.target.classList.add('show');
            }, i * 100);
          }
        });
      }, { threshold: 0.2 });

      cards.forEach(c => cardObserver.observe(c));
    });
    </script>
