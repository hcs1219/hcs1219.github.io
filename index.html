              <a href="mailto:hcskaiask@gmail.com" class="social-btn magnetic" aria-label="Email">

    </main>

    <script>
    // Grain animation
    const canvas = document.getElementById('grain');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    function noise() {
      const imageData = ctx.createImageData(canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const value = Math.random() * 255;
        data[i] = value;
        data[i + 1] = value;
        data[i + 2] = value;
        data[i + 3] = 15;
      }
      ctx.putImageData(imageData, 0, 0);
    }
    
    let frame = 0;
    function animateGrain() {
      frame++;
      if (frame % 3 === 0) noise();
      requestAnimationFrame(animateGrain);
    }
    animateGrain();

    // Cursor glow
    const cursorGlow = document.querySelector('.cursor-glow');
    let mouseX = 0, mouseY = 0;
    let currentX = 0, currentY = 0;
    
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    function animateCursor() {
      currentX += (mouseX - currentX) * 0.1;
      currentY += (mouseY - currentY) * 0.1;
      cursorGlow.style.left = currentX + 'px';
      cursorGlow.style.top = currentY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Magnetic effect
    const magneticElements = document.querySelectorAll('.magnetic');
    
    magneticElements.forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const rect = el.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        
        el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        
        const content = el.querySelector('.btn-content, .card-content');
        if (content) {
          content.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px)`;
        }
      });
      
      el.addEventListener('mouseleave', () => {
        el.style.transform = 'translate(0, 0)';
        const content = el.querySelector('.btn-content, .card-content');
        if (content) {
          content.style.transform = 'translate(0, 0)';
        }
      });
    });

    // Avatar tilt
    const avatarContainer = document.querySelector('.avatar-container');
    if (avatarContainer) {
      avatarContainer.addEventListener('mousemove', (e) => {
        const rect = avatarContainer.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        
        avatarContainer.style.transform = `perspective(1000px) rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
      });
      
      avatarContainer.addEventListener('mouseleave', () => {
        avatarContainer.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
      });
    }

    // Intersection Observer for reveals
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
        }
      });
    }, observerOptions);

    document.querySelectorAll('[data-reveal]').forEach(el => {
      revealObserver.observe(el);
    });

    // Section animations
    const sections = document.querySelectorAll('.section');
    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.2 });

    sections.forEach(section => sectionObserver.observe(section));

    // Staggered card reveals
    const cards = document.querySelectorAll('.link-card');
    const cardObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('show');
          }, index * 150);
        }
      });
    }, { threshold: 0.1 });

    cards.forEach(card => cardObserver.observe(card));

    // Name letter animation
    const nameLetters = document.querySelectorAll('.name span');
    nameLetters.forEach((letter, index) => {
      letter.style.animationDelay = `${index * 0.1}s`;
      letter.classList.add('letter-animate');
    });

    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
    </script>
  </body>
