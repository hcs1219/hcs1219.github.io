<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator</title>
    
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-elevated: #1c1c1c;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: rgba(255,255,255,0.06);
            --radius: 12px;
            --radius-lg: 16px;
            --space: 16px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #fafafa;
                --surface: #ffffff;
                --surface-elevated: #f4f4f5;
                --text: #18181b;
                --text-secondary: #71717a;
                --text-muted: #a1a1aa;
                --border: rgba(0,0,0,0.06);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            padding: var(--space);
        }

        /* Minimal Header */
        .header {
            max-width: 1200px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.125rem;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Grid Layout */
        .app {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
                max-width: 600px;
            }
        }

        /* Editor Column */
        .editor {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Clean Card Style */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space);
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9375rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Compact Controls Grid */
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .control {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Color Input */
        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border);
            border-radius: 50%;
        }

        .color-hex {
            font-family: ui-monospace, monospace;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        /* Select & Range */
        select {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            cursor: pointer;
        }

        .range-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .range-val {
            color: var(--accent);
            font-family: ui-monospace, monospace;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        /* Preview Panel - Desktop */
        .preview-desktop {
            position: sticky;
            top: 16px;
        }

        @media (max-width: 900px) {
            .preview-desktop {
                display: none;
            }
        }

        .preview-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-height: 400px;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        #qrcode-desktop {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.3s;
        }

        #qrcode-desktop img {
            border-radius: 8px;
            background: white;
            padding: 8px;
            max-width: 100%;
        }

        .download-btn {
            padding: 10px 20px;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Mobile FAB */
        .fab {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.5);
            z-index: 50;
        }

        @media (max-width: 900px) {
            .fab {
                display: block;
            }
            .editor .btn {
                display: none;
            }
        }

        /* Modal - Clean & Detailed */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            max-height: 85vh;
            border-radius: var(--radius-lg);
            overflow: hidden;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        /* Modal Header - Minimal */
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal Content - Scrollable */
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* QR Display - Constrained */
        .qr-display {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #qrcode-mobile img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 8px;
            background: white;
            padding: 8px;
        }

        /* QR Details Grid */
        .qr-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 0.6875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-value {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            word-break: break-all;
        }

        .detail-value.mono {
            font-family: ui-monospace, monospace;
        }

        .detail-full {
            grid-column: 1 / -1;
        }

        .content-preview {
            max-height: 60px;
            overflow: hidden;
            position: relative;
        }

        .content-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(transparent, var(--bg));
        }

        /* Modal Actions */
        .modal-actions {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            flex: 2;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.875rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (min-width: 901px) {
            .modal-overlay {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M8 8h2v2H8zM14 8h2v2h-2zM8 14h2v2H8zM14 14h2v2h-2z"/>
            </svg>
        </div>
        QR Generator
    </header>

    <main class="app">
        <section class="editor">
            <div class="card">
                <textarea id="url" placeholder="Enter URL or text..." maxlength="2000" autofocus></textarea>
            </div>

            <div class="card controls">
                <div class="control">
                    <label>Foreground</label>
                    <div class="color-picker" onclick="document.getElementById('color-dark').click()">
                        <input type="color" id="color-dark" value="#000000">
                        <span class="color-hex" id="dark-hex">#000000</span>
                    </div>
                </div>
                
                <div class="control">
                    <label>Background</label>
                    <div class="color-picker" onclick="document.getElementById('color-light').click()">
                        <input type="color" id="color-light" value="#ffffff">
                        <span class="color-hex" id="light-hex">#ffffff</span>
                    </div>
                </div>

                <div class="control">
                    <label>Error Correction</label>
                    <select id="correctlevel">
                        <option value="L">Low</option>
                        <option value="M">Medium</option>
                        <option value="Q">Quartile</option>
                        <option value="H" selected>High</option>
                    </select>
                </div>

                <div class="control range-wrap">
                    <div class="range-header">
                        <label>Size</label>
                        <span class="range-val" id="size-val">512px</span>
                    </div>
                    <input type="range" id="size" value="512" min="128" max="1024" step="64">
                </div>
            </div>

            <button class="btn" id="desktop-generate">Generate QR Code</button>
        </section>

        <aside class="preview-desktop">
            <div class="preview-card">
                <div class="empty-state" id="empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M8 8h2v2H8zM14 8h2v2h-2zM8 14h2v2H8zM14 14h2v2h-2z"/>
                    </svg>
                    <p>QR code preview</p>
                </div>
                <div id="qrcode-desktop"></div>
            </div>
        </aside>
    </main>

    <button class="fab" id="mobile-generate">Generate</button>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">QR Code</span>
                <button class="close-btn" onclick="closeModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="qr-display">
                    <div id="qrcode-mobile"></div>
                </div>

                <div class="qr-details">
                    <div class="detail-item">
                        <span class="detail-label">Size</span>
                        <span class="detail-value mono" id="detail-size">512×512</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Error Correction</span>
                        <span class="detail-value" id="detail-level">High (30%)</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Colors</span>
                        <span class="detail-value mono" id="detail-colors">#000 on #fff</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Data Length</span>
                        <span class="detail-value mono" id="detail-length">0 chars</span>
                    </div>
                    <div class="detail-item detail-full">
                        <span class="detail-label">Content Preview</span>
                        <div class="detail-value content-preview" id="detail-content">-</div>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
                <button class="btn-primary" onclick="downloadMobile()">Download PNG</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        (() => {
            const $ = id => document.getElementById(id);
            
            // Elements
            const urlInput = $('url');
            const colorDark = $('color-dark');
            const colorLight = $('color-light');
            const sizeInput = $('size');
            const correctLevel = $('correctlevel');
            const modal = $('modal');
            
            // Update hex displays
            colorDark.oninput = () => $('dark-hex').textContent = colorDark.value;
            colorLight.oninput = () => $('light-hex').textContent = colorLight.value;
            sizeInput.oninput = () => $('size-val').textContent = sizeInput.value + 'px';

            // Generate function
            function generateQR(container, isMobile = false) {
                const text = urlInput.value.trim();
                if (!text) {
                    showToast('Enter content first');
                    urlInput.focus();
                    return false;
                }

                container.innerHTML = '';
                
                try {
                    new QRCode(container, {
                        text: text,
                        width: parseInt(sizeInput.value),
                        height: parseInt(sizeInput.value),
                        colorDark: colorDark.value,
                        colorLight: colorLight.value,
                        correctLevel: QRCode.CorrectLevel[correctLevel.value]
                    });

                    if (isMobile) {
                        updateDetails(text);
                    }
                    return true;
                } catch (e) {
                    showToast('Error generating');
                    return false;
                }
            }

            // Update modal details
            function updateDetails(text) {
                const levelMap = { L: 'Low (7%)', M: 'Medium (15%)', Q: 'Quartile (25%)', H: 'High (30%)' };
                const size = sizeInput.value;
                
                $('detail-size').textContent = `${size}×${size}`;
                $('detail-level').textContent = levelMap[correctLevel.value];
                $('detail-colors').textContent = `${colorDark.value} on ${colorLight.value}`;
                $('detail-length').textContent = `${text.length} chars`;
                $('detail-content').textContent = text;
            }

            // Desktop generate
            $('desktop-generate').onclick = () => {
                if (generateQR($('qrcode-desktop'))) {
                    $('empty').style.display = 'none';
                    
                    // Add download button if needed
                    const desktop = $('qrcode-desktop');
                    if (!desktop.querySelector('.download-btn')) {
                        const btn = document.createElement('button');
                        btn.className = 'download-btn';
                        btn.textContent = 'Download';
                        btn.onclick = () => downloadQR(desktop);
                        desktop.appendChild(btn);
                    }
                }
            };

            // Mobile generate
            $('mobile-generate').onclick = () => {
                if (generateQR($('qrcode-mobile'), true)) {
                    modal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            };

            // Download functions
            window.downloadQR = (container) => {
                const img = container.querySelector('img');
                if (img) {
                    const link = document.createElement('a');
                    link.download = `qr-${Date.now()}.png`;
                    link.href = img.src;
                    link.click();
                    showToast('Downloaded');
                }
            };

            window.downloadMobile = () => {
                window.downloadQR($('qrcode-mobile'));
            };

            // Modal controls
            window.closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            };

            modal.onclick = (e) => {
                if (e.target === modal) closeModal();
            };

            // Toast
            function showToast(msg) {
                const toast = $('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // Shortcuts
            document.onkeydown = (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    const isMobile = window.innerWidth <= 900;
                    document.getElementById(isMobile ? 'mobile-generate' : 'desktop-generate').click();
                }
                if (e.key === 'Escape') closeModal();
            };

            // Auto-resize
            urlInput.oninput = function() {
                this.style.height = 'auto';
                this.style.height = Math.max(100, this.scrollHeight) + 'px';
            };
        })();
    </script>
</body>
</html>
